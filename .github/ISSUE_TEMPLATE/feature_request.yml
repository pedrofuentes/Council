name: Feature request
description: Suggest an idea or enhancement for Council
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your interest in improving Council! Please describe your feature request in detail.

  - type: textarea
    id: motivation
    attributes:
      label: Problem / Motivation
      description: |
        What problem are you trying to solve? Why is this valuable? 
        Is your request related to a current limitation or frustration?
      placeholder: Explain the problem or use case this feature would address
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: A clear and concise description of what you want to happen.
      placeholder: Describe how you envision this feature working
    validations:
      required: true

  - type: textarea
    id: proposed-ux
    attributes:
      label: Proposed User Experience
      description: |
        How would users interact with this feature? Include command examples, UI mockups, or API signatures if applicable.
      placeholder: |
        Example command usage, configuration snippets, or interaction flow
      render: text
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you've considered.
      placeholder: Describe other approaches or workarounds you've thought about
    validations:
      required: false

  - type: textarea
    id: privacy-security
    attributes:
      label: Privacy and Security Implications
      description: |
        Does this feature involve sensitive data, authentication, external services, or have security considerations?
        Please describe any privacy or security aspects we should be aware of.
      placeholder: Describe any privacy or security concerns related to this feature
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, mockups, examples, or related issues here.
      placeholder: Any other information that would help us understand your request
    validations:
      required: false
