name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    permissions:
      contents: write # create release commits, tags, and GitHub releases
      pull-requests: write # open and update release PRs
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish @council-ai/cli
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Update npm for OIDC trusted publishing
        # OIDC trusted publishing requires npm >= 11.5; Node 22 ships npm 10.x.
        run: npm install -g npm@11.5.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @council-ai/cli build

      - name: Validate package exports (publint)
        run: pnpm --filter @council-ai/cli publint

      - name: Validate type definitions (attw)
        run: pnpm --filter @council-ai/cli attw

      - name: Verify package contents
        working-directory: packages/cli
        run: npm pack --dry-run

      - name: Publish to npm (OIDC trusted publishing + provenance)
        working-directory: packages/cli
        run: npm publish --provenance --access public
