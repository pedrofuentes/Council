name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - "packages/site/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

# Least-privilege defaults: top level grants only `contents: read` so the build
# job (which runs third-party code via pnpm install + astro build) has minimal
# permissions. The deploy job explicitly declares `pages: write` + `id-token: write`.
permissions:
  contents: read

# Serialize Pages deployments; never cancel an in-progress publish so a running
# deployment can finish cleanly.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The site's command-reference tooling imports the built @council-ai/cli
      # package; build it first so the workspace dependency resolves.
      - name: Build CLI
        run: pnpm --filter @council-ai/cli build

      - name: Build site
        run: pnpm --filter @council-ai/site build

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: packages/site/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
