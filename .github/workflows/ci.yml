name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Typecheck & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

  unit-tests:
    name: Unit Tests (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests (shard ${{ matrix.shard }}/4)
        # Invoke vitest directly via `pnpm --filter … exec` instead of the
        # `pnpm test:unit -- --shard=…` script indirection. Under bash (CI),
        # `pnpm run <script> -- <args>` forwards a literal `--` into the
        # script's argv (`vitest run tests/unit "--" "--shard=N/4"`). Vitest's
        # parser treats `--` as end-of-options, so `--shard` is consumed as a
        # positional filter rather than the shard flag — every shard then runs
        # the full suite instead of its slice. Calling vitest directly (scoped
        # to the council-ai workspace package) passes `--shard` through cleanly.
        run: pnpm --filter council-ai exec vitest run tests/unit --shard=${{ matrix.shard }}/4

  other-tests:
    name: E2E, Integration & Security Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: E2E tests
        run: pnpm test:e2e

      - name: Integration tests (offline subset)
        run: pnpm test:integration

      - name: Security tests
        run: pnpm test:security

  # Aggregate gate for branch protection — require this single check
  # instead of every individual shard, so changing shard count doesn't
  # break required-checks configuration.
  ci-pass:
    name: Typecheck, Lint & Test
    if: always()
    needs: [lint, unit-tests, other-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ||
                "${{ needs.unit-tests.result }}" != "success" ||
                "${{ needs.other-tests.result }}" != "success" ]]; then
            echo "One or more CI jobs failed:"
            echo "  lint: ${{ needs.lint.result }}"
            echo "  unit-tests: ${{ needs.unit-tests.result }}"
            echo "  other-tests: ${{ needs.other-tests.result }}"
            exit 1
          fi
