name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Typecheck, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.3.1

      - uses: pnpm/action-setup@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0

      - uses: actions/setup-node@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.4.0
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test:unit

      - name: E2E tests
        run: pnpm test:e2e

      - name: Integration tests (offline subset)
        run: pnpm test:integration

      - name: Security tests
        run: pnpm test:security
