name: Platform Smoke Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm --filter @council-ai/cli build

      - name: Typecheck
        run: pnpm --filter @council-ai/cli typecheck

      - name: Smoke test CLI
        shell: bash
        run: |
          set -euo pipefail
          
          # Test --version
          node packages/cli/dist/bin/council.js --version
          
          # Test --help
          node packages/cli/dist/bin/council.js --help
          
          # Test templates command (offline)
          node packages/cli/dist/bin/council.js templates || true
          
          echo "✓ CLI smoke tests passed on ${{ matrix.os }}"
