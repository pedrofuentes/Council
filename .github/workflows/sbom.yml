name: SBOM Generation

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-sbom:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-latest

    # contents: write is required to attach the SBOM to the GitHub release via `gh release upload`
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate CycloneDX SBOM
        run: npx --yes @cyclonedx/cyclonedx-npm@latest --ignore-npm-errors --output-format JSON --output-file sbom.cdx.json
        working-directory: packages/cli

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: packages/cli/sbom.cdx.json
          if-no-files-found: error

      - name: Attach SBOM to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" packages/cli/sbom.cdx.json
