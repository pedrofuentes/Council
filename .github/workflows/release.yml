name: Release

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish @council-ai/cli
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.13.0"
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Update npm for OIDC trusted publishing
        # OIDC trusted publishing requires npm >= 11.5; Node 22 ships npm 10.x.
        run: npm install -g npm@11.5.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @council-ai/cli build

      - name: Validate package exports (publint)
        run: pnpm --filter @council-ai/cli publint

      - name: Validate type definitions (attw)
        run: pnpm --filter @council-ai/cli attw

      - name: Verify package contents
        working-directory: packages/cli
        run: npm pack --dry-run

      - name: Publish to npm (OIDC trusted publishing + provenance)
        working-directory: packages/cli
        run: npm publish --provenance --access public
