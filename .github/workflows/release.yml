name: Release

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish @council-ai/cli
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Update npm for OIDC trusted publishing
        # OIDC trusted publishing requires npm >= 11.5; Node 22 ships npm 10.x.
        run: npm install -g npm@11.5.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @council-ai/cli build

      - name: Validate package exports (publint)
        run: pnpm --filter @council-ai/cli publint

      - name: Validate type definitions (attw)
        run: pnpm --filter @council-ai/cli attw

      - name: Verify package contents
        working-directory: packages/cli
        run: npm pack --dry-run

      - name: Publish to npm (OIDC trusted publishing + provenance)
        working-directory: packages/cli
        run: npm publish --provenance --access public
