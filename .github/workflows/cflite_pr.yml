# ClusterFuzzLite — fuzz the code change on every PR that touches the terminal
# sanitizer or the fuzzing config. A new crash or invariant violation fails the
# check. Docs: https://google.github.io/clusterfuzzlite/
name: ClusterFuzzLite (PR)

on:
  pull_request:
    branches: [main]
    paths:
      - "packages/cli/src/cli/strip-control-chars.ts"
      - "packages/cli/src/cli/hidden-format-chars.ts"
      - ".clusterfuzzlite/**"
      - ".github/workflows/cflite_pr.yml"

permissions: {}

jobs:
  fuzzing:
    name: PR fuzzing
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read # checkout the PR head
      actions: read # read the prior corpus from the Actions cache
      security-events: write # upload SARIF findings to code scanning
    steps:
      - name: Build fuzzers
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          language: javascript
          sanitizer: none

      - name: Run fuzzers
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 120
          mode: code-change
          sanitizer: none
          output-sarif: true
