packages:
  - "packages/*"

# Moved from the package.json "pnpm" field, which pnpm 10 no longer reads.
# These are security/version pins for transitive dependencies; keep them in sync
# with any advisory remediation.
overrides:
  "brace-expansion@>=5": "5.0.6"
  "ws@>=8": "8.21.0"
  "uuid@<11.1.1": ">=11.1.1"
  "js-yaml@<4.2.0": ">=4.2.0 <5"
  "esbuild@<0.28.1": ">=0.28.1"
  "yaml@<2.8.3": ">=2.8.3"

# pnpm 10 does not run dependency build scripts unless explicitly allow-listed.
# esbuild (build/tsup) and sharp (packages/site image processing) need their builds.
onlyBuiltDependencies:
  - esbuild
  - sharp
